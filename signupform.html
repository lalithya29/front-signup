<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Signup form</title>
   <link rel="stylesheet" href="signup.css">

</head>
<body>
    <form id="myform">
        <h1>Signup form</h1>
        <!--Inline css:<h1 style="color:red;">signup form</h1>-->
        <label>Username</label>
        <input type="text" placeholder="Enter username" required/>
        <label>Email</label>
        <input type="email"placeholder="Enter Email" required/>
        <label>Mobile Number</label>
        <input type="number"placeholder="Enter Mobile Number"required/>
        <div id="gender">
            <input type="radio"><span>Male</span>
            <input type="radio"><span>Female</span>
        </div>
        <select>
            <option selected hidden>select any one opted our website</option>
            <option value="insta">Instagram</option>
            <option value="fb">Facebook</option>
            <option  value="github">Github</option>
            <option value="linkedin">Linkedin</option>
        </select>
        <div id="check">
            <input type="checkbox"/>
            <p>I accept the rules & regulations</p>
        </div>
        <button>Sign up</button>
        <div id="link">                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       


            
            <a href="forgotpass.html">Forgotpassword?</a>
            <a href="login.html">Login</a>
        </div>
    </form>
</body>
</html>
